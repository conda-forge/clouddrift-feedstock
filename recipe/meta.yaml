{% set name = "clouddrift" %}
{% set version = "0.48.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/clouddrift-{{ version }}.tar.gz
  sha256: 1fb2bc04a0cb94f532285b90c1c58b1de2fb00862b579060f0157699c51d0bf8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

context:
  python_min: "3.10"
  
requirements:
  host:
    - python {{ python_min }}
    - uv-build
    - pip
  run:
    - python >={{ python_min }}
    - aiohttp >=3.13.5
    - awkward >=2.9.0
    - fsspec >=2026.3.0
    - netcdf4 >=1.7.3
    - numpy >=2.2.6
    - pandas >=2.3.3
    - pyarrow >=23.0.1
    - requests >=2.33.1
    - scipy >=1.15.2
    - tenacity >=9.1.4
    - tqdm >=4.67.3
    - xarray >=2025.6.1
    - zarr <3

test:
  imports:
    - clouddrift
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/clouddrift/
  summary: Accelerating the use of Lagrangian data for atmospheric, oceanic, and climate sciences
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - KevinShuman
    - philippemiron
    - selipot
    - kevinsantana11
